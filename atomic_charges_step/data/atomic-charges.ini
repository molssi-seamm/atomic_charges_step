# Configuration options for how to run the charge-analysis program (Chargemol,
# for DDEC6). This mirrors mopac.ini: one section per executor type, read at run
# time. By default SEAMM installs Chargemol into a 'seamm-chargemol' conda
# environment and runs it there.

[local]
# The type of local installation to use. Options are:
#     conda: Use a conda environment
#   modules: Use the modules system
#     local: Use a local installation
# By default SEAMM installs Chargemol using conda.

installation = conda

# The command line to use, starting with the executable followed by any options.
# For a 'local' installation this should be the full path to the executable (or
# it must be on the PATH).

code = chargemol

######################### conda section ############################
# The full path to the conda executable (filled in by the installer):

# conda =

# The Conda environment to use -- either the name or the full path:

# conda-environment = seamm-chargemol

######################### modules section ############################
# The modules to load to run Chargemol, as a space-separated list:

# modules =

######################### local section ############################
# For a 'local' installation put the full path to the executable in 'code' above.
